<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | BluNav</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Design System & CSS Reset */
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #312e81 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #0f172a 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--surface-border);
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }

        select {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--surface-border);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:hover {
            border-color: var(--primary);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--surface-border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .product-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .product-card .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: var(--surface-border);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        /* Cart Summary */
        .cart-summary {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: sticky;
            top: 6rem;
            height: fit-content;
        }

        .cart-summary h2 {
            font-size: 1.25rem;
            border-bottom: 1px solid var(--surface-border);
            padding-bottom: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .summary-row.total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            border-top: 1px solid var(--surface-border);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .cart-item-qty {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.8rem;
        }

        .status-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            font-size: 0.9rem;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .status-message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        
        .checkbox-container input {
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Spinner */
        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 1rem;
            height: 1rem;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 0.5rem;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading .loader {
            display: inline-block;
        }
    </style>
</head>
<body>

<header>
    <h1>BluNav Checkout</h1>
    <select id="currency-selector" aria-label="Select Currency">
        <option value="USD">USD ($)</option>
        <option value="EUR">EUR (€)</option>
        <option value="GBP">GBP (£)</option>
    </select>
</header>

<div class="container">
    <main class="products" id="product-list">
        <!-- Products injected via JS -->
    </main>

    <aside class="glass-panel cart-summary">
        <h2>Order Summary</h2>
        <div class="cart-items" id="cart-items-container">
            <!-- Cart items injected via JS -->
            <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center;" id="empty-cart-msg">Your cart is empty.</p>
        </div>
        
        <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
            <span>Tax (8%)</span>
            <span id="tax-amount">$0.00</span>
        </div>
        <div class="summary-row total">
            <span>Total</span>
            <span id="total-amount">$0.00</span>
        </div>

        <div class="checkbox-container">
            <input type="checkbox" id="mock-failure-toggle">
            <label for="mock-failure-toggle">Simulate Payment Failure</label>
        </div>

        <button id="checkout-btn" disabled>
            <span class="loader"></span>
            <span class="btn-text">Proceed to Checkout</span>
        </button>

        <div id="status-container" class="status-message"></div>
    </aside>
</div>

<script>
    const products = [
        { id: 'item-1', name: 'Premium Widget', basePrice: 100 },
        { id: 'item-2', name: 'Super Widget', basePrice: 150 },
        { id: 'item-3', name: 'Mega Widget', basePrice: 200 }
    ];

    const rates = { USD: 1, EUR: 0.92, GBP: 0.79 };
    const symbols = { USD: '$', EUR: '€', GBP: '£' };

    let cart = {};
    let currentCurrency = 'USD';

    const productListEl = document.getElementById('product-list');
    const cartItemsEl = document.getElementById('cart-items-container');
    const emptyCartMsg = document.getElementById('empty-cart-msg');
    const subtotalEl = document.getElementById('subtotal');
    const taxEl = document.getElementById('tax-amount');
    const totalEl = document.getElementById('total-amount');
    const currencySelector = document.getElementById('currency-selector');
    const checkoutBtn = document.getElementById('checkout-btn');
    const statusContainer = document.getElementById('status-container');
    const mockFailureToggle = document.getElementById('mock-failure-toggle');

    function formatPrice(price) {
        const converted = price * rates[currentCurrency];
        return `${symbols[currentCurrency]}${converted.toFixed(2)}`;
    }

    function renderProducts() {
        productListEl.innerHTML = '';
        products.forEach(p => {
            const el = document.createElement('div');
            el.className = 'product-card';
            el.setAttribute('data-id', p.id);
            el.innerHTML = `
                <h3>${p.name}</h3>
                <p class="price" data-base-price="${p.basePrice}">${formatPrice(p.basePrice)}</p>
                <button class="add-to-cart-btn" data-id="${p.id}">Add to Cart</button>
            `;
            productListEl.appendChild(el);
        });

        document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.target.getAttribute('data-id');
                addToCart(id);
            });
        });
    }

    function addToCart(id) {
        if (!cart[id]) cart[id] = 0;
        cart[id]++;
        updateCart();
    }

    function updateCart() {
        let subtotal = 0;
        cartItemsEl.innerHTML = '';

        const itemKeys = Object.keys(cart);
        if (itemKeys.length === 0) {
            cartItemsEl.appendChild(emptyCartMsg);
            checkoutBtn.disabled = true;
        } else {
            checkoutBtn.disabled = false;
            itemKeys.forEach(id => {
                const product = products.find(p => p.id === id);
                const qty = cart[id];
                subtotal += product.basePrice * qty;

                const itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.innerHTML = `
                    <span>${product.name}</span>
                    <div>
                        <span class="cart-item-qty">x${qty}</span>
                        <span style="margin-left: 0.5rem; font-weight: 600;">${formatPrice(product.basePrice * qty)}</span>
                    </div>
                `;
                cartItemsEl.appendChild(itemEl);
            });
        }

        const tax = subtotal * 0.08;
        const total = subtotal + tax;

        subtotalEl.innerText = formatPrice(subtotal);
        taxEl.innerText = formatPrice(tax);
        totalEl.innerText = formatPrice(total);
    }

    currencySelector.addEventListener('change', (e) => {
        currentCurrency = e.target.value;
        renderProducts();
        updateCart();
    });

    checkoutBtn.addEventListener('click', async () => {
        statusContainer.className = 'status-message';
        checkoutBtn.classList.add('loading');
        checkoutBtn.disabled = true;
        checkoutBtn.querySelector('.btn-text').innerText = 'Processing...';

        const failMock = mockFailureToggle.checked;

        try {
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-mock-failure': failMock ? 'true' : 'false'
                },
                body: JSON.stringify({ cart })
            });

            const data = await res.json();

            if (data.success) {
                statusContainer.innerText = `Success! Order ID: ${data.orderId}`;
                statusContainer.classList.add('success');
                cart = {};
                updateCart();
            } else {
                throw new Error(data.message || 'Payment failed');
            }
        } catch (err) {
            statusContainer.innerText = `Error: ${err.message}`;
            statusContainer.classList.add('error');
        } finally {
            checkoutBtn.classList.remove('loading');
            checkoutBtn.disabled = Object.keys(cart).length === 0;
            checkoutBtn.querySelector('.btn-text').innerText = 'Proceed to Checkout';
        }
    });

    // Initial render
    renderProducts();
</script>

</body>
</html>
